name: Build Cakru Dodge Stable

on:
  push:
    branches: [ "stable-version", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build Rust Core
        run: |
          cd rust_logic
          cargo build --target aarch64-linux-android --release
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build NDK Shared Library
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          $NDK_PATH/ndk-build NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk

      - name: Java Compile & DEX
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar
          mkdir -p obj/java
          find src -name "*.java" > java_files.txt
          javac -d obj/java -cp $PLATFORM_JAR @java_files.txt
          $BUILD_TOOLS_PATH/d8 --release --lib $PLATFORM_JAR --output . obj/java/com/cakru/dodge/*.class

      - name: Package APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar
          
          # Packaging res (layout, strings, dll)
          $BUILD_TOOLS_PATH/aapt package -f -M AndroidManifest.xml -I $PLATFORM_JAR -S res -F cakru-unsigned.apk
          
          # Masukkan DEX dan Native Libs
          zip -g cakru-unsigned.apk classes.dex
          mkdir -p lib/arm64-v8a
          cp libs/arm64-v8a/libhello.so lib/arm64-v8a/
          zip -rg cakru-unsigned.apk lib/

      - name: Sign & Align
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Cakru"
          $BUILD_TOOLS_PATH/zipalign -f 4 cakru-unsigned.apk cakru-aligned.apk
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore --ks-pass pass:android --out cakru-final.apk cakru-aligned.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Final-APK
          path: cakru-final.apk

