name: Build Cakru Dodge

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build Rust Logic
        run: |
          cd rust_logic
          cargo build --target aarch64-linux-android --release
          mkdir -p ../jni
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build Native Code (NDK)
        run: |
          # Cari lokasi NDK secara dinamis di runner GitHub
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          $NDK_PATH/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk

      - name: Compile Java & Create DEX
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar
          
          # 1. Compile Java ke Class
          mkdir -p obj/java
          javac -d obj/java -bootclasspath $PLATFORM_JAR src/com/cakru/dodge/MainActivity.java
          
          # 2. Ubah Class ke classes.dex (Wajib agar hasCode=true)
          $BUILD_TOOLS_PATH/d8 --release --lib $PLATFORM_JAR --output . obj/java/com/cakru/dodge/*.class

      - name: Assemble APK (The Final Fix)
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar

          # Buat Manifest yang memanggil MainActivity, bukan NativeActivity
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cakru.dodge">
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" />
              <application android:hasCode="true" android:label="Cakru Dodge">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > AndroidManifest.xml

          # Paketkan APK
          mkdir -p empty_res
          $BUILD_TOOLS_PATH/aapt package -f -M AndroidManifest.xml -I $PLATFORM_JAR -F cakru-temp.apk empty_res
          
          # Inject DEX (Logika Java)
          zip -g cakru-temp.apk classes.dex
          
          # Inject Native Library (Logika Rust)
          mkdir -p lib/arm64-v8a
          cp libs/arm64-v8a/libhello.so lib/arm64-v8a/
          zip -g cakru-temp.apk lib/arm64-v8a/libhello.so

      - name: Sign APK (Debug Mode)
        run: |
          # Buat kunci debug otomatis agar tidak perlu setting secrets dulu
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Cakru"
          
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore --ks-pass pass:android --out cakru.apk cakru-temp.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Dodge-Build
          path: cakru.apk
