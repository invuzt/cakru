name: Build Cakru Dodge

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nndixon/setup-ndk@v1
        with:
          ndk-version: r26b # Gunakan versi yang stabil

      - name: Build Rust Logic
        run: |
          cd rust_logic
          # Hapus lockfile jika ada konflik workspace
          rm -f ../Cargo.toml 
          cargo build --target aarch64-linux-android --release
          mkdir -p ../jni
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build Native Code (NDK)
        run: |
          # Menggunakan ndk-build dari path yang sudah di-setup
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Java & Create DEX
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar
          
          mkdir -p obj/java
          javac -d obj/java -cp $PLATFORM_JAR src/com/cakru/dodge/MainActivity.java
          
          # Gunakan d8 untuk mengubah class ke dex
          $BUILD_TOOLS_PATH/d8 --release --lib $PLATFORM_JAR --output . obj/java/com/cakru/dodge/*.class

      - name: Assemble APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar
          
          # Gunakan AndroidManifest.xml asli dari repo jika ada, atau buat baru
          mkdir -p empty_res
          $BUILD_TOOLS_PATH/aapt package -f -M AndroidManifest.xml -I $PLATFORM_JAR -F cakru-temp.apk empty_res
          
          # Masukkan DEX dan Shared Library (.so)
          zip -g cakru-temp.apk classes.dex
          mkdir -p lib/arm64-v8a
          cp libs/arm64-v8a/libhello.so lib/arm64-v8a/
          zip -r -g cakru-temp.apk lib/

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Cakru"
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore --ks-pass pass:android --out cakru-ready.apk cakru-temp.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Dodge-Release
          path: cakru-ready.apk
