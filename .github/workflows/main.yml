name: Build Cakru Dodge Stable

on:
  push:
    branches: [ "stable-version", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build Rust Logic
        run: |
          cd rust_logic
          # Build library statis Rust
          cargo build --target aarch64-linux-android --release
          mkdir -p ../jni
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build Native Code (NDK)
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          # Menggabungkan Rust ke dalam libhello.so
          $NDK_PATH/ndk-build NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk

      - name: Compile Java & Create DEX
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar

          mkdir -p obj/java
          # Kompilasi semua file Java
          find src -name "*.java" > java_files.txt
          javac -d obj/java -cp $PLATFORM_JAR @java_files.txt

          # Convert ke DEX format (D8)
          $BUILD_TOOLS_PATH/d8 --release --lib $PLATFORM_JAR --output . obj/java/com/cakru/dodge/*.class

      - name: Assemble APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar

          # --- FIX: Buat dummy resource agar AAPT tidak error ---
          mkdir -p res/drawable
          echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#FF0000"/></shape>' > res/drawable/ic_launcher.xml

          # Packaging dengan AAPT
          $BUILD_TOOLS_PATH/aapt package -f -M AndroidManifest.xml \
            -I $PLATFORM_JAR \
            -S res \
            -F cakru-temp.apk

          # Masukkan DEX ke dalam APK
          zip -g cakru-temp.apk classes.dex

          # Masukkan Native Libs (.so) dari folder libs hasil NDK
          mkdir -p lib/arm64-v8a
          cp libs/arm64-v8a/libhello.so lib/arm64-v8a/
          zip -rg cakru-temp.apk lib/

      - name: Sign & Align APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)

          # Buat keystore debug otomatis
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Cakru, O=Odfiz, C=ID"

          # Optimasi struktur file (Zipalign)
          $BUILD_TOOLS_PATH/zipalign -f 4 cakru-temp.apk cakru-aligned.apk
          
          # Tanda tangan APK agar bisa diinstall
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore \
            --ks-pass pass:android \
            --out cakru-final.apk cakru-aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Dodge-Final-APK
          path: cakru-final.apk

