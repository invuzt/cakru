name: Build Cakru Hybrid
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build Rust Logic
        run: |
          cd rust_logic
          cargo build --target aarch64-linux-android --release
          mkdir -p ../jni
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build Native Code (NDK)
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -n 1)
          make NDK_PATH=$NDK_PATH

      - name: Package to APK
        run: |
          mkdir -p build/apk/lib/arm64-v8a
          cp libs/arm64-v8a/libhello.so build/apk/lib/arm64-v8a/
          
          # Buat Manifest sederhana
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cakru.dodge" android:versionCode="1" android:versionName="1.0"><uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" /><application android:hasCode="false" android:label="Cakru Dodge"><activity android:name="android.app.NativeActivity" android:configChanges="orientation|keyboardHidden" android:exported="true"><meta-data android:name="android.app.lib_name" android:value="hello" /><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>' > build/apk/AndroidManifest.xml
          
          cd build/apk && zip -r ../../cakru-unsigned.apk .

      - name: Sign APK (Fix MinSdkVersion)
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Cakru, OU=Dev, O=Cakru, L=Ponorogo, S=EastJava, C=ID"
          
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          
          # Tambahkan --min-sdk-version 21 agar apksigner tidak mengecek Manifest XML yang mentah
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore --ks-pass pass:android --min-sdk-version 21 --out cakru-final.apk cakru-unsigned.apk

      - name: Upload Cakru APK
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Hybrid-Final
          path: cakru-final.apk
